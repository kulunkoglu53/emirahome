  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"Organization",
    "name":"EMIRA HOME",
    "url":"https://emirahome.com/",
    "logo":"https://emirahome.com/assets/emirahome-hero.png",
    "description":"Ev dekorasyon ve ev güzelleştirme alanında zarif, seçili ve zamansız ürünler sunan marka."
  }
  </script>

  <style>
    :root{
      --page-bg:#efe8df;
      --panel-bg:#f4eee7;
      --radius:30px;
      --shadow:0 18px 50px rgba(0,0,0,.10);
      --pad:24px;
      --hero-max:1720px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--page-bg);
      font-family:Georgia,"Times New Roman",serif;
      overflow-x:hidden;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(255,255,255,.35), transparent 42%),
        linear-gradient(180deg,#f3eee7 0%,#eee6dc 100%);
    }

    .hero-wrap{
      min-height:100svh;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:var(--pad);
    }

    .hero-card{
      width:min(calc(100vw - (var(--pad) * 2)), var(--hero-max));
      background:var(--panel-bg);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      position:relative;
      line-height:0;
    }

    .hero-card img{
      display:block;
      width:100%;
      height:auto;
      max-width:100%;
      object-fit:contain;
      transition:transform .8s ease, filter .8s ease;
      position:relative;
      z-index:1;
    }

    .hero-card:hover img{
      transform:scale(1.02);
      filter:brightness(1.04) saturate(1.03);
    }

    .hero-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.14), transparent 24%),
        radial-gradient(circle at 72% 38%, rgba(255,230,180,.10), transparent 22%),
        linear-gradient(115deg, transparent 30%, rgba(255,255,255,.12) 48%, transparent 66%);
      opacity:0;
      transform:translateX(-6%);
      transition:opacity .8s ease, transform .8s ease;
      pointer-events:none;
      z-index:2;
      mix-blend-mode:screen;
    }

    .hero-card:hover::after{
      opacity:1;
      transform:translateX(0);
    }

    @media (max-width: 991px){
      :root{
        --pad:16px;
        --radius:22px;
      }
      .hero-wrap{
        align-items:flex-start;
      }
      .hero-card{
        width:calc(100vw - (var(--pad) * 2));
      }
    }

    @media (max-width: 767px){
      :root{
        --pad:10px;
        --radius:16px;
      }
      .hero-wrap{
        padding:var(--pad);
        min-height:auto;
      }
      .hero-card{
        width:calc(100vw - (var(--pad) * 2));
      }
      .hero-card img{
        width:100%;
        height:auto;
      }
    }
  </style>
</head>
<body>
  <main class="hero-wrap">
    <section class="hero-card" aria-label="EMIRA HOME ana sayfa görseli">
      <img src="./assets/emirahome-hero.png" alt="EMIRA HOME ev dekorasyon ve ev güzelleştirme ana sayfa banner görseli" />
    </section>
  </main>
</body>

<head>
  <meta charset="UTF-8" />

  <meta name="keywords" content="ev dekorasyon, ev güzelleştirme, home decor, dekoratif obje, yaşam alanı, salon dekorasyonu, modern ev dekorasyonu, zamansız tasarım, ev aksesuarları, EMIRA HOME" />

  <meta property="og:title" content="EMIRA HOME | Ev Dekorasyon ve Ev Güzelleştirme" />
  <meta property="og:description" content="Ev dekorasyon ve ev güzelleştirme için zarif, seçili ve zamansız dokunuşlar." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EMIRA HOME | Ev Dekorasyon ve Ev Güzelleştirme" />
  <meta name="twitter:description" content="Ev dekorasyon ve ev güzelleştirme için zarif, seçili ve zamansız dokunuşlar." />
  <meta name="twitter:image" content="assets/emirahome-hero.png" />

  <style>
    :root {
      --page-bg: #efe8df;
      --panel-bg: #f4eee7;
      --radius: 28px;
      --pad: 24px;
      --shadow: 0 18px 55px rgba(0,0,0,.10);
      --img-ratio: 1536 / 1024;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--page-bg);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,.36), transparent 42%),
        linear-gradient(180deg,#f3eee7 0%,#eee6dc 100%);
    }

    .hero-wrap {
      width: 100%;
      min-height: 100svh;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--pad);
    }

    /* Çerçeve ve resim aynı anda boyutlanır */
    .hero-card {
      position: relative;
      width: min(calc(100vw - (var(--pad) * 2)), calc((100vh - (var(--pad) * 2)) * (1536 / 1024)));
      aspect-ratio: var(--img-ratio);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--panel-bg);
      isolation: isolate;
      line-height: 0;
    }

    .hero-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transition: transform .9s ease, filter .9s ease;
      will-change: transform, filter;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.14), transparent 22%),
        radial-gradient(circle at 72% 35%, rgba(255,240,210,.12), transparent 22%),
        linear-gradient(110deg, transparent 30%, rgba(255,255,255,.16) 48%, transparent 64%);
      opacity: 0;
      transform: translateX(-8%);
      transition: opacity .9s ease, transform .9s ease;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 2;
    }

    .hero-card:hover img {
      transform: scale(1.03);
      filter: brightness(1.05) saturate(1.04);
    }

    .hero-card:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 1024px) {
      :root {
        --pad: 16px;
        --radius: 22px;
      }
      .hero-wrap {
        align-items: start;
      }
      .hero-card {
        width: min(calc(100vw - (var(--pad) * 2)), calc((100svh - (var(--pad) * 2)) * (1536 / 1024)));
        width: min(calc(100vw - (var(--pad) * 2)), calc((100vh - (var(--pad) * 2)) * (1536 / 1024)));
      }
    }

    @media (max-width: 767px) {
      :root {
        --pad: 10px;
        --radius: 16px;
      }
      .hero-wrap {
        min-height: auto;
        padding: var(--pad);
      }
      .hero-card {
        width: calc(100vw - (var(--pad) * 2));
        aspect-ratio: var(--img-ratio);
      }
      .hero-card img {
        object-fit: cover;
        object-position: center center;
      }
    }
  </style>
</head>
<body>
  <main class="hero-wrap">
    <section class="hero-card" aria-label="EMIRA HOME ana sayfa görseli">
      <img src="./assets/emirahome-hero.png" alt="EMIRA HOME ev dekorasyon ve ev güzelleştirme ana sayfa banner görseli" />
    </section>
  </main>
</body>
</html>
